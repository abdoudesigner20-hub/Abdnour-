name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          # هذا السطر يضمن أننا في المجلد الذي يحتوي على الكود
          if [ ! -f buildozer.spec ]; then
            echo "Error: buildozer.spec not found! Checking subdirectories..."
            cd $(dirname $(find . -name "buildozer.spec" | head -n 1)) || exit 1
          fi
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CurrencyConverter-Final-APK
          path: bin/*.apk
          
